version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    # <block name="consul-pin-ignore" affects="go.mod:consul-pin">
    # consul/api >= v1.34.2 requires Go 1.26. Keep it pinned in go.mod until this
    # library raises its minimum Go version to 1.26. Remove this ignore together
    # with the consul-pin block in go.mod at that time. See #189.
    ignore:
      - dependency-name: "github.com/hashicorp/consul/api"
        versions: [ ">=1.34.2" ]
    # </block>
    groups:
      all-dependencies:
        patterns:
          - "*"
